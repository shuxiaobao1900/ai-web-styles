<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>场景解决方案中心</title>
<style>
  *, *::before, *::after { box-sizing: box-sizing; margin: 0; padding: 0; }
  :root {
    --bg:    #F4F6FC;
    --text:  #0B1E3D;
    --dim:   rgba(11,30,61,0.50);
    --dimmer:rgba(11,30,61,0.30);
    --border:rgba(0,47,167,0.08);
    --klein: #002FA7;
  }
  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', 'Noto Sans SC', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── AMBIENT ── */
  .bg-glow { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .bg-orb  { position: absolute; border-radius: 50%; filter: blur(90px); }

  /* ── NAV ── */
  nav {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 60px; height: 68px;
    border-bottom: 1px solid rgba(0,47,167,0.08);
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
  }
  .nav-logo {
    font-size: 17px; font-weight: 800; color: var(--text);
    letter-spacing: -0.5px; text-decoration: none;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-mark {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, #002FA7, #1A6BFF);
    display: flex; align-items: center; justify-content: center;
  }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a { font-size: 14px; color: var(--dim); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }
  .nav-cta {
    font-size: 13px; font-weight: 600; color: #FFFFFF;
    background: linear-gradient(135deg, #002FA7, #1A6BFF);
    padding: 8px 20px; border-radius: 8px; text-decoration: none;
    transition: opacity 0.2s, transform 0.15s;
  }
  .nav-cta:hover { opacity: 0.85; transform: translateY(-1px); }

  /* ── PAGE ── */
  .page { position: relative; z-index: 1; padding: 64px 0 72px; }

  /* ── HEADER ── */
  .header { text-align: center; margin-bottom: 56px; position: relative; overflow: visible; padding: 20px 0 10px; }

  /* 标题背景光晕 */
  .header-bg-glow {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 800px; height: 320px;
    background: radial-gradient(ellipse 60% 70% at 50% 50%,
      rgba(0,47,167,0.07) 0%, rgba(0,47,167,0.03) 50%, transparent 75%);
    pointer-events: none; z-index: 0;
  }
  .header > *:not(.header-bg-glow):not(.h-icon) { position: relative; z-index: 1; }

  /* 3D 悬浮 icon 通用 */
  .h-icon {
    position: absolute; pointer-events: none; z-index: 2;
    animation: hFloat ease-in-out infinite;
  }
  @keyframes hFloat {
    0%,100% { transform: translateY(0px) rotateZ(var(--rz,0deg)); }
    50%      { transform: translateY(-10px) rotateZ(var(--rz,0deg)); }
  }

  /* 立体小方块 */
  .h-cube {
    width: 38px; height: 38px;
    transform-style: preserve-3d;
    perspective: 160px;
    animation: hFloat ease-in-out infinite, cubeRotate 10s linear infinite;
  }
  @keyframes cubeRotate {
    from { transform: translateY(0) rotateX(20deg) rotateY(0deg); }
    50%  { transform: translateY(-10px) rotateX(20deg) rotateY(180deg); }
    to   { transform: translateY(0) rotateX(20deg) rotateY(360deg); }
  }
  .cube-face {
    position: absolute; border-radius: 4px;
    border: 1px solid rgba(0,47,167,0.35);
  }
  .cube-front { width:26px;height:26px; background:rgba(0,47,167,0.18); top:6px;left:6px; transform:translateZ(13px); }
  .cube-back  { width:26px;height:26px; background:rgba(0,47,167,0.08); top:6px;left:6px; transform:rotateY(180deg) translateZ(13px); }
  .cube-right { width:26px;height:26px; background:rgba(0,47,167,0.12); top:6px;left:6px; transform:rotateY(90deg) translateZ(13px); }
  .cube-left  { width:26px;height:26px; background:rgba(0,47,167,0.12); top:6px;left:6px; transform:rotateY(-90deg) translateZ(13px); }
  .cube-top   { width:26px;height:26px; background:rgba(0,47,167,0.25); top:6px;left:6px; transform:rotateX(90deg) translateZ(13px); }

  /* 立体球 */
  .h-sphere {
    width: 32px; height: 32px; border-radius: 50%;
    background: radial-gradient(circle at 35% 32%, rgba(80,130,255,0.6) 0%, rgba(0,47,167,0.75) 55%, rgba(0,20,80,0.9) 100%);
    box-shadow:
      0 6px 22px rgba(0,47,167,0.45),
      inset -4px -4px 10px rgba(0,0,100,0.35),
      inset 3px 3px 8px rgba(140,180,255,0.45);
    animation: hFloat ease-in-out infinite, spherePulse 3s ease-in-out infinite;
  }
  @keyframes spherePulse {
    0%,100% { box-shadow: 0 6px 22px rgba(0,47,167,0.45), inset -4px -4px 10px rgba(0,0,100,0.35), inset 3px 3px 8px rgba(140,180,255,0.45); }
    50%      { box-shadow: 0 8px 32px rgba(0,47,167,0.65), inset -4px -4px 10px rgba(0,0,100,0.35), inset 3px 3px 8px rgba(140,180,255,0.55); }
  }

  /* 立体菱形 */
  .h-diamond {
    width: 28px; height: 28px;
    background: linear-gradient(145deg, rgba(0,80,220,0.7) 0%, rgba(0,47,167,0.9) 60%, rgba(0,20,80,0.8) 100%);
    transform: rotate(45deg);
    border-radius: 4px;
    box-shadow: 0 4px 18px rgba(0,47,167,0.5), inset 1px 1px 4px rgba(140,180,255,0.5);
    animation: hFloat ease-in-out infinite, diamondSpin 8s linear infinite;
  }
  @keyframes diamondSpin {
    from { transform: rotate(45deg) rotateY(0deg); }
    to   { transform: rotate(45deg) rotateY(360deg); }
  }

  /* 环形 */
  .h-ring {
    width: 34px; height: 34px; border-radius: 50%;
    border: 5px solid rgba(0,47,167,0.7);
    box-shadow: 0 0 0 1px rgba(0,47,167,0.15), 0 4px 16px rgba(0,47,167,0.35), inset 0 0 8px rgba(80,140,255,0.2);
    animation: hFloat ease-in-out infinite, ringRotate 6s linear infinite;
  }
  @keyframes ringRotate {
    from { transform: rotateX(60deg) rotateZ(0deg); }
    to   { transform: rotateX(60deg) rotateZ(360deg); }
  }

  /* 小三角 */
  .h-tri {
    width: 0; height: 0;
    border-left: 13px solid transparent;
    border-right: 13px solid transparent;
    border-bottom: 22px solid rgba(0,47,167,0.55);
    filter: drop-shadow(0 4px 10px rgba(0,47,167,0.4));
    animation: hFloat ease-in-out infinite;
  }

  /* icon 各自位置 & 动画延迟 */
  .h-i1 { left: calc(50% - 380px); top: 28px;  --rz:0deg;  animation-duration:3.8s; animation-delay:0s; }
  .h-i2 { left: calc(50% - 300px); top: 82px;  --rz:0deg;  animation-duration:4.4s; animation-delay:-1.2s; }
  .h-i3 { left: calc(50% + 320px); top: 14px;  --rz:15deg; animation-duration:3.5s; animation-delay:-0.5s; }
  .h-i4 { left: calc(50% + 350px); top: 76px;  --rz:0deg;  animation-duration:4.1s; animation-delay:-2s; }
  .h-i5 { left: calc(50% - 340px); top: 130px; --rz:-10deg;animation-duration:4.8s; animation-delay:-1.8s; }
  .h-i6 { left: calc(50% + 290px); top: 118px; --rz:10deg; animation-duration:3.9s; animation-delay:-0.9s; }

  /* ── STAGE RINGS（底座同心圆）── */
  .stage-rings {
    position: absolute;
    bottom: -60px; left: 50%;
    transform: translateX(-50%);
    width: 1060px; height: 190px;
    pointer-events: none; z-index: 0;
  }
  .stage-rings svg { width:100%; height:100%; overflow:visible; }
  .header-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,47,167,0.06); border: 1px solid rgba(0,47,167,0.15);
    border-radius: 100px; padding: 6px 16px;
    font-size: 12px; font-weight: 600; color: #2A5FEA;
    letter-spacing: 0.5px; margin-bottom: 20px;
  }
  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #002FA7;
    box-shadow: 0 0 8px rgba(0,47,167,0.5);
    animation: dotPulse 2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%,100% { box-shadow: 0 0 6px rgba(0,47,167,0.4); }
    50%      { box-shadow: 0 0 16px rgba(0,47,167,0.5), 0 0 28px rgba(0,47,167,0.2); }
  }
  .header h1 {
    font-size: clamp(32px, 4.5vw, 54px); font-weight: 800;
    letter-spacing: -2px; line-height: 1.1; margin-bottom: 14px;
    color: var(--text);
  }
  .grad-text {
    background: linear-gradient(135deg, #002FA7 0%, #1A6BFF 40%, #00C6FF 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p { font-size: 16px; color: var(--dim); max-width: 480px; margin: 0 auto; line-height: 1.7; }

  /* ── STAGE ── */
  .stage {
    position: relative;
    width: 100%;
    display: flex; align-items: center; justify-content: center;
    min-height: 660px;
    perspective: 1400px;
    overflow: visible;
  }

  /* ── CARD BASE ── */
  .scene-card {
    position: absolute;
    width: 960px;
    border-radius: 24px;
    border: 1px solid rgba(0,47,167,0.08);
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(24px);
    box-shadow: 0 4px 24px rgba(0,47,167,0.04), 0 1px 3px rgba(0,47,167,0.06);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.52s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: center center;
    will-change: transform, opacity;
  }

  /* positions */
  .scene-card.pos-left-far  { transform: translateX(-740px) scale(0.72) rotateY(14deg); opacity: 0; pointer-events: none; z-index: 1; }
  .scene-card.pos-left      { transform: translateX(-530px) scale(0.8)  rotateY(9deg);  opacity: 0.45; pointer-events: all; z-index: 3; filter: brightness(0.92); }
  .scene-card.pos-center    { transform: translateX(0)       scale(1)    rotateY(0deg);  opacity: 1;   pointer-events: all; z-index: 10; filter: brightness(1); }
  .scene-card.pos-right     { transform: translateX(530px)   scale(0.8)  rotateY(-9deg); opacity: 0.45; pointer-events: all; z-index: 3; filter: brightness(0.92); }
  .scene-card.pos-right-far { transform: translateX(740px)   scale(0.72) rotateY(-14deg);opacity: 0; pointer-events: none; z-index: 1; }

  .scene-card.pos-left:hover  { opacity: 0.6; filter: brightness(0.96); }
  .scene-card.pos-right:hover { opacity: 0.6; filter: brightness(0.96); }

  /* prism top-edge shimmer — only on active */
  .scene-card.pos-center {
    border-color: rgba(0,47,167,0.2);
    box-shadow:
      0 12px 48px rgba(0,47,167,0.10),
      0 4px 12px rgba(0,47,167,0.06),
      0 0 0 1px rgba(0,47,167,0.08);
  }
  .card-glow-top {
    position: absolute; top: 0; left: 0; right: 0; height: 320px;
    pointer-events: none; opacity: 0; transition: opacity 0.5s;
    border-radius: 24px 24px 0 0;
  }
  .card-top-line {
    position: absolute; top: 0; left: 8%; right: 8%; height: 2px;
    border-radius: 1px; opacity: 0; transition: opacity 0.5s;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(0,47,167,0.6) 15%,
      rgba(130,200,255,0.9) 30%,
      rgba(255,180,255,0.8) 45%,
      #FFFFFF     55%,
      rgba(130,200,255,0.9) 70%,
      rgba(0,47,167,0.6) 85%,
      transparent 100%
    );
    filter: blur(0.3px);
  }
  .scene-card.pos-center .card-glow-top,
  .scene-card.pos-center .card-top-line { opacity: 1; }

  /* ── CARD LAYOUT ── */
  .card-body {
    position: relative; z-index: 2;
    display: grid;
    grid-template-columns: 400px 1fr;
    min-height: 620px;
  }

  /* ── LEFT PANEL ── */
  .card-left {
    padding: 40px 36px 36px 40px;
    display: flex; flex-direction: column;
    border-right: 1px solid rgba(0,47,167,0.07);
  }

  .card-tag {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; border-radius: 7px; padding: 5px 12px;
    margin-bottom: 20px; width: fit-content;
  }
  .card-icon-name {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 14px;
  }
  .card-icon {
    width: 52px; height: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.4s;
  }
  .scene-card.pos-center .card-icon { transform: scale(1.06); }
  .card-name {
    font-size: 26px; font-weight: 800; letter-spacing: -0.8px;
    line-height: 1.2; color: var(--text);
  }
  .card-desc {
    font-size: 14px; color: var(--dim); line-height: 1.75;
    margin-bottom: 20px;
  }

  /* ── SCENE ILLUSTRATION ── */
  .card-illustration {
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(0,47,167,0.10);
    margin-bottom: 20px;
    flex-shrink: 0;
    background: #EDF1F9;
    transition: border-color 0.4s;
  }
  .scene-card.pos-center .card-illustration { border-color: rgba(0,47,167,0.20); }
  .card-illustration svg { display: block; width: 100%; height: auto; }

  /* Value chips */
  .card-values { display: flex; flex-wrap: wrap; gap: 7px; margin-top: auto; }
  .value-chip {
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,47,167,0.04);
    border: 1px solid rgba(0,47,167,0.10);
    border-radius: 7px; padding: 6px 11px;
    font-size: 12px; color: rgba(11,30,61,0.65);
  }
  .value-dot { width: 5px; height: 5px; border-radius: 50%; }

  /* ── RIGHT PANEL ── */
  .card-right {
    padding: 40px 40px 36px 36px;
    display: flex; flex-direction: column;
  }
  .card-right-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--dimmer);
    margin-bottom: 18px;
  }
  .features-list { display: flex; flex-direction: column; gap: 0; flex: 1; }
  .feature-item {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 16px 0;
    border-bottom: 1px solid rgba(0,47,167,0.06);
  }
  .feature-item:first-child { padding-top: 0; }
  .feature-item:last-child  { border-bottom: none; }
  .feature-icon {
    width: 32px; height: 32px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .feature-body h4 { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .feature-body p  { font-size: 13px; color: var(--dim); line-height: 1.62; }

  /* CTA row */
  .card-cta-row {
    margin-top: 20px; padding-top: 18px;
    border-top: 1px solid rgba(0,47,167,0.08);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-cta-hint { font-size: 13px; color: var(--dimmer); }
  .card-cta-btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 700;
    padding: 9px 18px; border-radius: 9px;
    text-decoration: none; color: #FFFFFF;
    transition: opacity 0.2s, transform 0.15s;
    opacity: 0; pointer-events: none;
  }
  .scene-card.pos-center .card-cta-btn { opacity: 1; pointer-events: all; }
  .card-cta-btn:hover { opacity: 0.82; transform: translateY(-1px); }

  /* ── CONTROLS ── */
  .controls {
    display: flex; align-items: center; justify-content: center;
    gap: 20px; margin-top: 44px;
  }
  .nav-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(0,47,167,0.12);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text);
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,47,167,0.06);
  }
  .nav-btn:hover { background: rgba(0,47,167,0.08); border-color: rgba(0,47,167,0.30); transform: scale(1.08); }
  .nav-btn:active { transform: scale(0.95); }

  .dots { display: flex; gap: 7px; align-items: center; }
  .dot {
    height: 6px; width: 6px; border-radius: 3px;
    background: rgba(0,47,167,0.15);
    cursor: pointer;
    transition: all 0.36s cubic-bezier(0.4,0,0.2,1);
  }
  .dot.active { width: 30px; }
  .dot:not(.active):hover { background: rgba(0,47,167,0.30); }

  .kb-hint {
    text-align: center; margin-top: 22px;
    font-size: 12px; color: rgba(11,30,61,0.20);
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .kb-key {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 20px; border-radius: 4px;
    border: 1px solid rgba(0,47,167,0.15);
    background: rgba(255,255,255,0.7);
    font-size: 10px; color: rgba(11,30,61,0.35);
  }

  /* ── DETAIL PAGE ── */
  .detail-page {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: #F4F6FC; overflow-y: auto;
  }
  .detail-page.visible {
    display: block;
    animation: pageIn 0.42s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes pageIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .detail-nav {
    position: sticky; top: 0; z-index: 10;
    padding: 0 60px; height: 64px;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,47,167,0.08);
    display: flex; align-items: center; justify-content: space-between;
  }
  .back-btn {
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; font-size: 14px; color: var(--dim);
    transition: color 0.2s; background: none; border: none; padding: 0;
  }
  .back-btn:hover { color: var(--text); }
  .back-btn:hover svg { transform: translateX(-3px); }
  .back-btn svg { transition: transform 0.2s; }
  .detail-nav-logo { font-size: 15px; font-weight: 800; color: rgba(11,30,61,0.3); }

  .detail-body { max-width: 920px; margin: 0 auto; padding: 72px 60px 100px; }
  .detail-tag {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; border-radius: 7px; padding: 5px 12px;
    margin-bottom: 18px;
  }
  .detail-title {
    font-size: clamp(34px, 5vw, 54px); font-weight: 800;
    letter-spacing: -2px; line-height: 1.1; margin-bottom: 16px;
  }
  .detail-sub { font-size: 17px; color: var(--dim); line-height: 1.75; max-width: 640px; margin-bottom: 48px; }
  .detail-divider { height: 1px; background: rgba(0,47,167,0.08); margin: 44px 0; }
  .d-section { margin-bottom: 52px; }
  .d-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--dimmer); margin-bottom: 20px;
  }
  .d-values { display: flex; flex-wrap: wrap; gap: 10px; }
  .d-value {
    display: flex; align-items: center; gap: 9px;
    background: rgba(255,255,255,0.8);
    border: 1px solid rgba(0,47,167,0.10);
    border-radius: 10px; padding: 11px 16px;
    font-size: 14px; color: rgba(11,30,61,0.72);
  }
  .d-value-dot { width: 8px; height: 8px; border-radius: 50%; }
  .d-features { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .d-feature {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(0,47,167,0.08);
    border-radius: 14px; padding: 22px;
  }
  .d-feature-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
  }
  .d-feature h4 { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .d-feature p  { font-size: 13px; color: var(--dim); line-height: 1.65; }
  .d-flow { display: flex; flex-direction: column; }
  .d-step {
    display: flex; gap: 16px; align-items: flex-start;
    padding: 20px 0; border-bottom: 1px solid rgba(0,47,167,0.06);
  }
  .d-step:last-child { border-bottom: none; }
  .d-step-num {
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; flex-shrink: 0;
  }

      <div class="card-glow-top" style="background:radial-gradient(ellipse at 50% 0%,${s.bgAlpha} 0%,transparent 70%)"></div>
      <div class="card-top-line"></div>

        <div class="card-left">
          <div class="card-tag" style="color:${s.color};background:${s.bgAlpha}">${s.tag}</div>
          <div class="card-icon-name">
            <div class="card-icon" style="background:${s.bgAlpha}">${CARD_ICONS[i](s.color, 'rgba(255,255,255,0.8)')}</div>
            <div class="card-name">${s.name.replace('\n','<br>')}</div>
          </div>
          <div class="card-desc">${s.desc}</div>
          <div class="card-illustration">${ILLUSTRATIONS[i](s.color)}</div>
          <div class="card-values">
            ${s.values.map(v=>`<div class="value-chip"><div class="value-dot" style="background:${s.color}"></div>${v}</div>`).join('')}
          </div>
        </div>
        <div class="card-right">
          <div class="card-right-label">核心功能</div>
          <div class="features-list">
            ${s.features.map(f=>`
              <div class="feature-item">
                <div class="feature-icon" style="background:${s.bgAlpha};color:${s.color}">${f.icon}</div>
                <div class="feature-body"><h4>${f.title}</h4><p>${f.desc}</p></div>
              </div>`).join('')}
          </div>
          <div class="card-cta-row">
            <span class="card-cta-hint">点击查看完整方案 →</span>
            <a class="card-cta-btn" href="#"
               style="background:linear-gradient(135deg,${s.color},${s.colorDark})"
               onclick="event.preventDefault();openDetail(${i})">
              查看详情
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5h9M7.5 3l3 3.5-3 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>

  });
}

function buildDots() {
  const el = document.getElementById('dots');
  SCENES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.addEventListener('click', () => goTo(i));
    el.appendChild(d);
  });
}

function updateUI() {
  const cards = document.querySelectorAll('.scene-card');
  const dots  = document.querySelectorAll('.dot');
  const s = SCENES[current];

  cards.forEach((card, i) => {
    card.classList.remove('pos-center','pos-left','pos-right','pos-left-far','pos-right-far');
    const diff = ((i - current + N) % N);
    const sym  = diff > N / 2 ? diff - N : diff;
    if      (sym ===  0) card.classList.add('pos-center');
    else if (sym === -1) card.classList.add('pos-left');
    else if (sym ===  1) card.classList.add('pos-right');
    else if (sym <= -2)  card.classList.add('pos-left-far');
    else                 card.classList.add('pos-right-far');
  });

  dots.forEach((d, i) => {
    d.classList.toggle('active', i === current);
    d.style.background = i === current ? `linear-gradient(90deg,${s.color},${s.colorDark})` : '';
    d.style.boxShadow  = i === current ? `0 0 10px ${s.color}60` : '';
  });

  document.getElementById('bgGlow').innerHTML = `
    <div class="bg-orb" style="width:720px;height:720px;background:radial-gradient(circle,${s.orbColor} 0%,transparent 70%);top:-200px;left:50%;transform:translateX(-50%);transition:background 0.6s"></div>
    <div class="bg-orb" style="width:420px;height:320px;background:radial-gradient(circle,rgba(0,47,167,0.04) 0%,transparent 70%);bottom:5%;right:4%"></div>`;
}

function goTo(idx) {
  current = ((idx % N) + N) % N;
  updateUI();
}

// ── DIFY WORKFLOW RENDERER (SVG bezier curves) ────────────────
function renderDifyFlow(s, idx) {
  const container = document.getElementById('dify-flow-' + idx);
  if (!container) return;

  const NODE_W = 128;   // node width
  const NODE_H = 78;    // approx node height (fixed for layout)
  const COL_GAP = 56;   // horizontal gap between cols
  const ROW_GAP = 14;   // vertical gap between nodes in same col
  const PAD_X   = 28;   // canvas horizontal padding
  const PAD_Y   = 28;   // canvas vertical padding

  const cols = s.workflow;

  // ── 1. compute positions ──────────────────────────────────────
  // Each col: colX = PAD_X + ci*(NODE_W+COL_GAP)
  // Nodes in col stack vertically, centered on col midY
  const colData = cols.map((col, ci) => {
    const n = col.col.length;
    const colH = n * NODE_H + (n - 1) * ROW_GAP;
    return { nodes: col.col, colH, ci };
  });

  // total canvas height = max colH + 2*PAD_Y
  const maxColH = Math.max(...colData.map(c => c.colH));
  const canvasH = maxColH + PAD_Y * 2;
  const canvasW = cols.length * NODE_W + (cols.length - 1) * COL_GAP + PAD_X * 2;

  // node absolute rects: { x, y, cx, cy } (cx/cy = center)
  const nodeRects = colData.map(({ nodes, colH, ci }) => {
    const colX = PAD_X + ci * (NODE_W + COL_GAP);
    const topY  = PAD_Y + (maxColH - colH) / 2;
    return nodes.map((_, ni) => {
      const y = topY + ni * (NODE_H + ROW_GAP);
      return { x: colX, y, w: NODE_W, h: NODE_H,
               cx: colX + NODE_W / 2, cy: y + NODE_H / 2 };
    });
  });

  // ── 2. build HTML nodes ───────────────────────────────────────
  container.style.height = canvasH + 'px';
  container.style.width  = canvasW + 'px';
  container.style.minWidth = canvasW + 'px';

  let nodesHTML = '';
  colData.forEach(({ nodes, ci }) => {
    nodes.forEach((n, ni) => {
      const r = nodeRects[ci][ni];
      nodesHTML += `
        <div class="dify-col" style="left:${r.x}px;top:${r.y}px;width:${NODE_W}px;">
          <div class="dify-node type-${n.type}" style="width:${NODE_W}px;">
            <div class="dify-node-header">
              <div class="dify-node-icon">${nodeIcon(n.type)}</div>
              <span class="dify-node-type">${n.typeLabel}</span>
            </div>
            <div class="dify-node-title">${n.title}</div>
            <div class="dify-node-desc">${n.desc.replace(/\n/g,'<br>')}</div>
          </div>
        </div>`;
    });
  });

  // ── 3. build SVG bezier paths ─────────────────────────────────
  // Strategy: from each node in col[ci], draw a curve to each node in col[ci+1]
  // If 1→1: simple S-curve
  // If 1→N: fan out from right-center of source to left-center of each target
  // If N→1: fan in
  let paths = '';
  const strokeColor = 'rgba(0,47,167,0.22)';
  const strokeW = 1.6;

  for (let ci = 0; ci < colData.length - 1; ci++) {
    const srcNodes  = nodeRects[ci];
    const dstNodes  = nodeRects[ci + 1];

    srcNodes.forEach((src) => {
      dstNodes.forEach((dst, di) => {
        const x1 = src.x + NODE_W;      // right edge of src
        const y1 = src.cy;              // vertical center of src
        const x2 = dst.x;              // left edge of dst
        const y2 = dst.cy;             // vertical center of dst

        const dx = x2 - x1;
        const cpOffset = Math.max(dx * 0.45, 20);

        // cubic bezier: C (x1+cpOffset,y1) (x2-cpOffset,y2) (x2,y2)
        const d = `M ${x1} ${y1} C ${x1 + cpOffset} ${y1}, ${x2 - cpOffset} ${y2}, ${x2} ${y2}`;

        // arrowhead at endpoint
        const arrowAngle = Math.atan2(y2 - (y2), (x2) - (x2 - cpOffset * 0.3));
        // simplified: arrowhead always points right since we end horizontal
        const ax = x2, ay = y2;
        const arrowPath = `M ${ax - 7} ${ay - 3.5} L ${ax} ${ay} L ${ax - 7} ${ay + 3.5}`;

        // color by source node type for fan-out variety
        const srcType = colData[ci].nodes[0].type;
        let lineColor = strokeColor;
        if (dstNodes.length > 1) {
          // fan-out: tint each branch slightly
          const tints = ['rgba(0,47,167,0.28)','rgba(124,58,237,0.22)','rgba(8,145,178,0.22)'];
          lineColor = tints[di % tints.length];
        }

        paths += `
          <path d="${d}" fill="none" stroke="${lineColor}" stroke-width="${strokeW}" stroke-linecap="round"/>
          <path d="${arrowPath}" fill="none" stroke="${lineColor}" stroke-width="${strokeW}" stroke-linecap="round" stroke-linejoin="round"/>`;
      });
    });
  }

  const svgLayer = `<svg class="dify-svg-layer" width="${canvasW}" height="${canvasH}" viewBox="0 0 ${canvasW} ${canvasH}">${paths}</svg>`;

  container.innerHTML = svgLayer + nodesHTML;
}

    http:  `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="1"/><path d="M3 6h6M6 3c-1 1-1.5 1.9-1.5 3S5 8 6 9M6 3c1 1 1.5 1.9 1.5 3S7 8 6 9" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>`,
  };
  return m[type] || m.tool;
}

document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('detailPage').classList.remove('visible');
});
document.getElementById('prevBtn').addEventListener('click', () => goTo(current - 1));
document.getElementById('nextBtn').addEventListener('click', () => goTo(current + 1));
document.addEventListener('keydown', e => {
  const dp = document.getElementById('detailPage');
  if (dp.classList.contains('visible')) { if (e.key === 'Escape') dp.classList.remove('visible'); return; }
  if (e.key === 'ArrowLeft')  goTo(current - 1);
  if (e.key === 'ArrowRight') goTo(current + 1);
});
